services:
  - type: web
    name: invoiceflow
    runtime: docker
    plan: free
    envVars:
      - key: MONGO_URI
        sync: false
        description: "MongoDB connection URI (e.g. mongodb+srv://username:password@cluster.mongodb.net/dbname)"
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "5000"
